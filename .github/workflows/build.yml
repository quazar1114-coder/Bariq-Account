name: Build Flet APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install flet ummalqura

      - name: Build APK
        run: |
          flet build apk --product "حساب بلاد بارق"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Bariq-App
          path: build/apk/*.apk
