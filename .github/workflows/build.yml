name: Build Flet APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install flet ummalqura

      - name: Build APK
        run: |
          # إضافة --yes للموافقة التلقائية وتجنب خطأ EOFError
          flet build apk --product "حساب بلاد بارق" --yes

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Bariq-App
          path: build/apk/*.apk
