name: Build Flet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install flet ummalqura

      - name: Build APK
        run: |
          # أمر البناء مع التجاوز التلقائي لأي طلب إدخال لتجنب خطأ EOFError
          flet build apk --product "حساب بلاد بارق" --yes --no-android-signing

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Bariq-App
          path: build/apk/*.apk
