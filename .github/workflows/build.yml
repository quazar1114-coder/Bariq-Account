name: Build Flet APK
on:
  push:
    branches: [ main ] # سيعمل البناء تلقائياً عند رفع الكود

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install flet ummalqura

      - name: Build APK
        run: |
          # هذا الأمر يقوم ببناء التطبيق
          flet build apk --product "حساب بلاد بارق"

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: Bariq-App-Release
          path: build/apk/*.apk
